name: ci

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only reads the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The frontend gates. `lint` runs the local/no-arbitrary-value rule, so an arbitrary
  # Tailwind value (text-[#fff], p-[13px]) fails CI here — the design-system lock is
  # enforced by the pipeline, not by remembering to run it.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1 (node24)
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9 (node24)
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0 (node24)
        with:
          node-version: 22
          cache: pnpm
      # No build-permitting flag: the postinstall allowance is committed per-package in
      # pnpm-workspace.yaml (allowBuilds: esbuild: true) and read from there, so ONLY
      # esbuild is allowed to build — consistent with pinning the Actions above. A new
      # dependency that adds a postinstall would be blocked here until reviewed and listed.
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  # The BFF gates. inc5 added the OIDC deps (go-oidc + x/oauth2), so there IS a
  # go.sum now — the module cache keys off it, and the Go version comes from
  # go.mod so the two can't drift.
  bff:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bff
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1 (node24)
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0 (node24)
        with:
          go-version-file: apps/bff/go.mod
          cache-dependency-path: apps/bff/go.sum
      - run: go vet ./...
      - run: go test -race ./...
